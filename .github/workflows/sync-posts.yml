name: Sync External Posts

on:
  schedule:
    - cron: '0 20 * * *'  # UTC 20:00 = 北京时间次日凌晨 4:00
  workflow_dispatch:

# 给 GITHUB_TOKEN 写权限，否则 git push 会失败
permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync external posts
        run: node tools/sync-posts.js

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet source/_posts/ || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push new posts
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source/_posts/ .sync-log.json
          git commit -m "📝 sync: auto-import external posts ($(date +%Y-%m-%d))"
          git push

      - name: Trigger deploy
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          gh workflow run deploy.yml --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}
